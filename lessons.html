<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER SCHOOL TJ — Дарсҳо</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0e;
  --bg2: #0a1520;
  --bg3: #0d1e2e;
  --green: #00ff88;
  --green2: #00cc66;
  --cyan: #00d4ff;
  --red: #ff3355;
  --yellow: #ffcc00;
  --orange: #ff8800;
  --text: #c8d8e8;
  --text2: #6a8a9a;
  --border: #1a3a4a;
  --glow: 0 0 20px rgba(0,255,136,0.3);
  --sidebar-w: 300px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  height: 100vh;
  overflow-y: auto;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-logo {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.sidebar-logo span {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
}

.sidebar-logo small {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--text2);
  letter-spacing: 1px;
}

.week-header {
  padding: 14px 20px 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--cyan);
  letter-spacing: 2px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.week-header:first-of-type { margin-top: 0; border-top: none; }

.lesson-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  position: relative;
}

.lesson-item:hover { background: rgba(0,255,136,0.04); }

.lesson-item.active {
  background: rgba(0,255,136,0.07);
  border-left-color: var(--green);
}

.lesson-item.locked { opacity: 0.35; cursor: not-allowed; }

.lesson-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  min-width: 24px;
}

.lesson-item.active .lesson-num { color: var(--green); }

.lesson-title-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}

.lesson-item.active .lesson-title-text { color: var(--green); }

.lesson-status {
  font-size: 10px;
  margin-left: auto;
}

.lesson-item.done .lesson-status::before { content: '✓'; color: var(--green); }
.lesson-item.locked .lesson-status::before { content: '🔒'; }
.lesson-item.demo-only { }
.lesson-item.demo-only .lesson-status::before { content: '★'; color: var(--yellow); }

.progress-bar-wrap {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.progress-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.menu-btn {
  display: none;
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.lesson-breadcrumb {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text2);
}

.lesson-breadcrumb span { color: var(--green); }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.lang-toggle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all 0.2s;
}
.lang-toggle:hover { border-color: var(--green); color: var(--green); }

.nav-btns { display: flex; gap: 8px; }

.nav-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn:hover { border-color: var(--green); color: var(--green); }

.nav-btn.primary {
  background: var(--green);
  color: #050a0e;
  border-color: var(--green);
  font-weight: 700;
}
.nav-btn.primary:hover { background: var(--green2); }

/* ===== LESSON CONTENT ===== */
.lesson-content {
  padding: 40px 48px;
  max-width: 900px;
  animation: fadeSlide 0.4s ease;
}

@keyframes fadeSlide {
  from { opacity:0; transform: translateX(16px); }
  to { opacity:1; transform: translateX(0); }
}

.lesson-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 1px;
  margin-bottom: 20px;
}

.lesson-h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 8px;
}

.lesson-h1 .accent { color: var(--green); }

.lesson-meta {
  display: flex;
  gap: 20px;
  margin-bottom: 32px;
}

.meta-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.meta-tag .dot-sm {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
}

.lesson-section {
  margin-bottom: 32px;
}

.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--cyan);
  letter-spacing: 2px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.lesson-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
}

.lesson-text p { margin-bottom: 14px; }

.lesson-text strong { color: var(--green); font-weight: 600; }

.lesson-text .highlight {
  background: rgba(0,255,136,0.08);
  border-left: 3px solid var(--green);
  padding: 12px 16px;
  border-radius: 0 6px 6px 0;
  margin: 16px 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
}

.lesson-text .warn {
  background: rgba(255,204,0,0.06);
  border-left: 3px solid var(--yellow);
  padding: 12px 16px;
  border-radius: 0 6px 6px 0;
  margin: 16px 0;
  font-size: 14px;
  color: var(--yellow);
}

.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.2s;
}
.concept-card:hover { border-color: var(--cyan); }

.concept-icon { font-size: 24px; margin-bottom: 8px; display: block; }
.concept-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 4px;
}
.concept-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* ===== WEB TERMINAL ===== */
.terminal-section {
  margin: 32px 0;
}

.task-banner {
  background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,212,255,0.05));
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 10px 10px 0 0;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.task-icon { font-size: 20px; }
.task-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
}
.task-desc { font-size: 13px; color: var(--text2); margin-top: 2px; }

.terminal-widget {
  background: #020c10;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
}

.term-bar {
  background: #0a1520;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.term-dot { width:10px; height:10px; border-radius:50%; }
.td-red { background:#ff5f57; }
.td-yellow { background:#febc2e; }
.td-green { background:#28c840; }

.term-name {
  font-size: 11px;
  color: var(--text2);
  margin: 0 auto;
  letter-spacing: 1px;
}

.term-output {
  padding: 16px;
  min-height: 140px;
  max-height: 260px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.7;
  color: #c8ffcc;
}

.term-output::-webkit-scrollbar { width: 3px; }
.term-output::-webkit-scrollbar-thumb { background: var(--border); }

.term-line { display: block; }
.term-line.info { color: var(--cyan); }
.term-line.success { color: var(--green); }
.term-line.error { color: var(--red); }
.term-line.warn { color: var(--yellow); }
.term-line.dim { color: var(--text2); }

.term-input-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  gap: 8px;
}

.term-prompt-label {
  color: var(--green);
  font-size: 13px;
  white-space: nowrap;
}

.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #c8ffcc;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  caret-color: var(--green);
}

.term-hints {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.hint-chip {
  background: rgba(0,212,255,0.07);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  color: var(--cyan);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Share Tech Mono', monospace;
}
.hint-chip:hover { background: rgba(0,212,255,0.15); }

/* ===== QUIZ / ANALYSIS TASK ===== */
.quiz-widget {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin: 20px 0;
}

.quiz-bar {
  background: rgba(255,204,0,0.07);
  border-bottom: 1px solid rgba(255,204,0,0.2);
  padding: 12px 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--yellow);
  letter-spacing: 1px;
}

.quiz-body { padding: 20px; }

.quiz-question {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.6;
}

.quiz-options { display: flex; flex-direction: column; gap: 8px; }

.quiz-opt {
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
}

.quiz-opt:hover { border-color: var(--cyan); background: rgba(0,212,255,0.04); }
.quiz-opt.correct { border-color: var(--green); background: rgba(0,255,136,0.08); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(255,51,85,0.08); color: var(--red); }

.quiz-feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  line-height: 1.6;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); color: var(--green); }
.quiz-feedback.fail { background: rgba(255,51,85,0.08); border: 1px solid rgba(255,51,85,0.2); color: var(--red); }

/* ===== LOG ANALYZER ===== */
.log-widget {
  background: #020c10;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin: 20px 0;
}

.log-bar {
  background: #0a1520;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.log-content {
  padding: 14px 16px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  line-height: 1.8;
  max-height: 200px;
  overflow-y: auto;
  color: #aac8b8;
}

.log-content .log-highlight {
  background: rgba(255,204,0,0.15);
  color: var(--yellow);
  padding: 0 2px;
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.log-answer-row {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
}

.log-answer-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.log-answer-input:focus { border-color: var(--green); }

.log-check-btn {
  padding: 8px 16px;
  background: rgba(0,255,136,0.1);
  border: 1px solid var(--green);
  border-radius: 6px;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.log-check-btn:hover { background: var(--green); color: #050a0e; }

/* ===== SUCCESS OVERLAY ===== */
.success-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,10,14,0.9);
  z-index: 999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}
.success-overlay.show { display: flex; }

.success-modal {
  background: var(--bg2);
  border: 1px solid var(--green);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  max-width: 420px;
  box-shadow: 0 0 60px rgba(0,255,136,0.2);
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.success-icon { font-size: 60px; display: block; margin-bottom: 16px; }
.success-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 8px;
}
.success-msg { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.success-btn {
  padding: 14px 32px;
  background: var(--green);
  border: none;
  border-radius: 8px;
  color: #050a0e;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.success-btn:hover { background: var(--green2); transform: scale(1.03); }

/* ===== DEMO BANNER ===== */
.demo-banner {
  background: linear-gradient(135deg, rgba(255,204,0,0.08), rgba(255,136,0,0.05));
  border-bottom: 1px solid rgba(255,204,0,0.2);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
}

.demo-banner-text { color: var(--yellow); flex: 1; }
.demo-banner-text strong { font-weight: 700; }

.buy-btn {
  padding: 8px 20px;
  background: var(--yellow);
  border: none;
  border-radius: 6px;
  color: #050a0e;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  white-space: nowrap;
}
.buy-btn:hover { background: #e6b800; transform: scale(1.03); }

/* ===== CERT SECTION ===== */
.cert-card {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 20px 0;
}
.cert-icon { font-size: 40px; }
.cert-info h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  color: var(--yellow);
  margin-bottom: 6px;
}
.cert-info p { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -100%;
    z-index: 200;
    transition: left 0.3s;
    width: 280px;
    min-width: 280px;
  }
  .sidebar.open { left: 0; }
  .menu-btn { display: block; }
  .lesson-content { padding: 24px 20px; }
  .topbar { padding: 0 16px; }
  .lesson-h1 { font-size: 26px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo" onclick="window.location.href='index.html'">
    <span>🛡️</span>
    <div>
      <span>HACKER SCHOOL TJ</span>
      <small>// АЗ СИФР ТО ПЕНТЕСТ</small>
    </div>
  </div>

  <div id="lesson-list"></div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span id="prog-label">ПЕШРАФТ</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="lesson-breadcrumb">
      HACKER SCHOOL TJ / <span id="breadcrumb">ДАРС 1</span>
    </div>
    <div class="topbar-right">
      <span class="lang-toggle" onclick="toggleLang()" id="lang-toggle-btn">RU</span>
      <div class="nav-btns">
        <button class="nav-btn" onclick="prevLesson()" id="btn-prev">← ҚАБЛ</button>
        <button class="nav-btn primary" onclick="nextLesson()" id="btn-next">БАЪД →</button>
      </div>
    </div>
  </div>

  <div id="demo-banner-area"></div>

  <div class="lesson-content" id="lesson-content">
    <!-- Lesson rendered here -->
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="success-overlay">
  <div class="success-modal">
    <span class="success-icon" id="success-icon">🏆</span>
    <div class="success-title" id="success-title">ДАРС АНҶОМ ЁФТ!</div>
    <div class="success-msg" id="success-msg">Вазифа дуруст иҷро шуд. Ба дарси навбатӣ гузаред.</div>
    <button class="success-btn" onclick="dismissSuccess()" id="success-btn">ДАВОМ ДОДАН →</button>
  </div>
</div>

<script>
// =============================================
//  LESSON DATA — 20 LESSONS
// =============================================
const LESSONS = [
  // ===== WEEK 1 =====
  {

let currentLesson = 1;
let lang = 'tg';
let isDemo = false;
let completed = JSON.parse(localStorage.getItem('hs_completed') || '[]');
let hasAccess = localStorage.getItem('hs_access') === 'granted';

function init() {
  const params = new URLSearchParams(window.location.search);
  isDemo = params.get('demo') === '1';
  const lessonParam = parseInt(params.get('lesson') || '1');
  if (!hasAccess && !isDemo) {
    window.location.href = 'index.html';
    return;
  }
  buildSidebar();
  goToLesson(lessonParam);
  if (isDemo) showDemoBanner();
  updateProgress();
}

function buildSidebar() {
  const list = document.getElementById('lesson-list');
  let html = '';
  let week = 0;
  const weekNames_tg = ['ҲАФТАИ 1 — Чӣ тавр хакер фикр мекунад', 'ҲАФТАИ 2 — Разведка', 'ҲАФТАИ 3 — Ҳуҷум ва ҳимоя', 'ҲАФТАИ 4 — Пентести касбӣ'];
  const weekNames_ru = ['НЕДЕЛЯ 1 — Как думает хакер', 'НЕДЕЛЯ 2 — Разведка', 'НЕДЕЛЯ 3 — Атака и защита', 'НЕДЕЛЯ 4 — Профпентест'];

  LESSONS.forEach(l => {
    if (l.week !== week) {
      week = l.week;
      const wn = lang === 'tg' ? weekNames_tg[week-1] : weekNames_ru[week-1];
      html += `<div class="week-header">${wn}</div>`;
    }
    const isDone = completed.includes(l.id);
    const isLocked = isDemo && l.id > 1;
    const isActive = l.id === currentLesson;
    const cls = [
      isDone ? 'done' : '',
      isLocked ? 'locked' : '',
      isActive ? 'active' : '',
      l.demo ? 'demo-only' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="lesson-item ${cls}" onclick="handleLessonClick(${l.id})">
      <span class="lesson-num">${String(l.id).padStart(2,'0')}</span>
      <span class="lesson-title-text">${lang === 'tg' ? l.title_tg : l.title_ru}</span>
      <span class="lesson-status"></span>
    </div>`;
  });
  list.innerHTML = html;
}

function handleLessonClick(id) {
  if (isDemo && id > 1) {
    alert(lang === 'tg' ? 'Ин дарс танҳо барои хонандагони пурра дастрас аст. Рамзи дастрасӣ харед!' : 'Этот урок доступен только для оплативших. Купите код доступа!');
    return;
  }
  goToLesson(id);
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function goToLesson(id) {
  currentLesson = id;
  const l = LESSONS.find(x => x.id === id);
  if (!l) return;
  document.getElementById('breadcrumb').textContent = (lang === 'tg' ? 'ДАРС ' : 'УРОК ') + id;
  document.getElementById('btn-prev').style.opacity = id === 1 ? '0.3' : '1';
  document.getElementById('btn-next').textContent = id === 20 ? (lang === 'tg' ? 'АНҶОМ ✓' : 'ФИНАЛ ✓') : (lang === 'tg' ? 'БАЪД →' : 'ДАЛЕЕ →');
  renderLesson(l);
  buildSidebar();
  document.querySelector('.main').scrollTo(0,0);
}

function renderLesson(l) {
  const theory = lang === 'tg' ? l.theory_tg : l.theory_ru;
  const badge = lang === 'tg' ? l.badge_tg : l.badge_ru;
  const title = lang === 'tg' ? l.title_tg : l.title_ru;
  const taskLabel = lang === 'tg' ? '// ВАЗИФАИ АМАЛӢ' : '// ПРАКТИЧЕСКОЕ ЗАДАНИЕ';
  const theoryLabel = lang === 'tg' ? '// НАЗАРИЯ' : '// ТЕОРИЯ';
  const taskDesc = lang === 'tg' ? (l.task_tg || '') : (l.task_ru || '');

  let taskHTML = '';

  if (l.task_type === 'quiz') {
    taskHTML = renderQuiz(l);
  } else if (l.task_type === 'terminal') {
    taskHTML = renderTerminal(l);
  } else if (l.task_type === 'log') {
    taskHTML = renderLogAnalyzer(l);

let termHistory = [];
let termHistoryIdx = -1;

function initTerminal(l) {
  const input = document.getElementById('term-input');
  if (input) {
    input.focus();
    termHistory = [];
    termHistoryIdx = -1;
  }
}

function fillCmd(cmd) {
  const input = document.getElementById('term-input');
  if (input) { input.value = cmd; input.focus(); }
}

function handleTermKey(e) {
  const input = document.getElementById('term-input');
  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = input.value.trim();
    if (!cmd) return;
    termHistory.unshift(cmd);
    termHistoryIdx = -1;
    input.value = '';
    executeCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (termHistoryIdx < termHistory.length - 1) {
      termHistoryIdx++;
      input.value = termHistory[termHistoryIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (termHistoryIdx > 0) {
      termHistoryIdx--;
      input.value = termHistory[termHistoryIdx];
    } else {
      termHistoryIdx = -1;
      input.value = '';
    }
  }
}

function executeCommand(cmd) {
  const l = LESSONS.find(x => x.id === currentLesson);
  const out = document.getElementById('term-output');
  if (!out || !l || !l.terminal_commands) return;

  // Echo command
  const echoLine = document.createElement('span');
  echoLine.className = 'term-line';
  echoLine.style.color = 'var(--green)';
  echoLine.textContent = `root@hackerschool:~# ${cmd}`;
  out.appendChild(echoLine);

  const responses = l.terminal_commands[cmd] || l.terminal_commands[cmd.toLowerCase()];

  if (responses) {
    if (responses[0] === '__clear__') {
      out.innerHTML = '';
    } else {
      responses.forEach(line => {
        const el = document.createElement('span');
        el.className = 'term-line';
        if (line.startsWith('[+]') || line.includes('FLAG{') || line.includes('Табрик') || line.includes('Congratulations')) {
          el.className = 'term-line success';
        } else if (line.startsWith('[!]') || line.startsWith('⚠️')) {
          el.className = 'term-line warn';
        } else if (line.startsWith('[*]')) {
          el.className = 'term-line info';
        } else if (line.startsWith('bash:') || line.includes('Error')) {
          el.className = 'term-line error';
        }
        el.innerHTML = line;
        out.appendChild(el);
      });
    }
  } else {
    const el = document.createElement('span');
    el.className = 'term-line error';
    el.textContent = `bash: ${cmd}: command not found`;
    out.appendChild(el);
  }

  out.scrollTop = out.scrollHeight;

  // Check success
  if (l.success_cmd && cmd === l.success_cmd) {
    setTimeout(() => triggerSuccess(l.id), 800);
  }
}
